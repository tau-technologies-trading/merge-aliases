name: Rust unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - uses: actions/checkout@v6.0.3
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
